<svg width="640" height="240" viewBox="0 0 640 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Project placeholder">
  <defs>
    <linearGradient id="ph-bg" x1="0" y1="0" x2="640" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d0d1f"/>
      <stop offset="1" stop-color="#0f1322"/>
    </linearGradient>
    <radialGradient id="ph-glow" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="240" fill="url(#ph-bg)"/>
  <ellipse cx="320" cy="120" rx="260" ry="160" fill="url(#ph-glow)"/>

  <!-- dot grid -->
  <g fill="#2dd4bf" opacity="0.08">
    <circle cx="40" cy="40" r="1.5"/><circle cx="80" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/>
    <circle cx="600" cy="200" r="1.5"/><circle cx="560" cy="200" r="1.5"/><circle cx="520" cy="200" r="1.5"/>
  </g>

  <!-- abstract chart glyph -->
  <g transform="translate(320 120)">
    <g stroke="#2dd4bf" stroke-opacity="0.5" stroke-width="3" fill="none" stroke-linecap="round">
      <polyline points="-70,30 -30,-5 5,12 45,-30 75,-12"/>
    </g>
    <g fill="#8b5cf6" fill-opacity="0.7">
      <rect x="-78" y="22" width="14" height="24" rx="2"/>
      <rect x="-38" y="-12" width="14" height="58" rx="2"/>
      <rect x="2" y="6" width="14" height="40" rx="2"/>
      <rect x="42" y="-36" width="14" height="82" rx="2"/>
    </g>
  </g>

  <text x="320" y="210" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="500" letter-spacing="2" fill="#475569">PROJECT PREVIEW</text>
</svg>
